version: 2

sources:
  - name: raw
    database: REVSENSE_AI
    schema: RAW
    config:
      freshness:
        warn_after:
          count: 1
          period: day
        error_after:
          count: 2
          period: day
    tables:
      - name: orders
        description: "Raw order events from the Olist dataset"
        columns:
          - name: order_id
            description: "Unique order identifier"
            tests:
              - not_null
              - unique
          - name: customer_id
            description: "Customer identifier linked to each order"
            tests:
              - not_null
      - name: customers
        description: "Raw customer reference data"
        columns:
          - name: customer_id
            description: "Unique customer identifier"
            tests:
              - not_null
              - unique
      - name: order_items
        description: "Raw order item detail rows"
        columns:
          - name: order_item_id
            description: "Unique order item identifier"
            tests:
              - not_null
              - unique
      - name: products
        description: "Raw product master data"
        columns:
          - name: product_id
            description: "Unique product identifier"
            tests:
              - not_null
              - unique
      - name: order_payments
        description: "Raw payment events for orders"
        columns:
          - name: order_id
            description: "Order identifier for payment rows"
            tests:
              - not_null
      - name: order_reviews
        description: "Raw review records for orders"
        columns:
          - name: review_id
            description: "Unique review identifier"
            tests:
              - not_null
              - unique
      - name: sellers
        description: "Raw seller reference data"
        columns:
          - name: seller_id
            description: "Unique seller identifier"
            tests:
              - not_null
              - unique
      - name: geolocation
        description: "Raw ZIP code geographic data"
        columns:
          - name: geolocation_zip_code_prefix
            description: "ZIP code prefix for geolocation records"
            tests:
              - not_null
      - name: product_category_translation
        description: "Raw product category translations"
        columns:
          - name: product_category_name
            description: "Product category name in Portuguese"
            tests:
              - not_null

